<svg width="100%" viewBox="0 0 1000 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Pixel art sunset to night forest banner</title>
<desc>Minecraft-style blocky mountains, spruce trees, twinkling stars, a square moon, and drifting clouds transitioning from sunset orange to night purple.</desc>
<style>
@keyframes twinkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
.star { animation: twinkle 2.6s ease-in-out infinite; }
@keyframes driftNear { from { transform: translateX(0); } to { transform: translateX(-1000px); } }
@keyframes driftFar { from { transform: translateX(0); } to { transform: translateX(-1000px); } }
.cloud-near { animation: driftNear 42s linear infinite; }
.cloud-far { animation: driftFar 75s linear infinite; }
</style>

